version: '3.8'

services:
  # ============================================================
  # MySQL 数据库
  # ============================================================
  mysql:
    image: mysql:8.0
    container_name: short-url-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-short_url}
      MYSQL_USER: ${MYSQL_USER:-appuser}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-app123}
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command: 
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --max_connections=200
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 10s
      retries: 5
    networks:
      - short-url-network

  # ============================================================
  # Redis 缓存
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: short-url-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      timeout: 5s
      retries: 5
    networks:
      - short-url-network

  # ============================================================
  # Go 应用
  # ============================================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: short-url-app
    restart: always
    ports:
      - "8080:8080"
    environment:
      # 数据库配置

      # 设置环境为 prod，加载 config.prod.yaml
      #APP_ENV: prod
      # 环境变量覆盖配置
      APP_DATABASE_HOST: mysql
      APP_DATABASE_USER: root
      APP_DATABASE_PASSWORD: 123456
      APP_DATABASE_NAME: short_url
      APP_REDIS_ADDR: redis:6379
      APP_REDIS_DB: 0
      APP_SERVER_PORT: "8080"
      APP_LOG_LEVEL: info
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - short-url-network
    volumes:
      - ./logs:/app/logs
    # 开发模式：挂载本地代码，方便热更新（可选）
    # volumes:
    #   - .:/app
    # command: go run main.go

# ============================================================
# 数据卷
# ============================================================
volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local

# ============================================================
# 网络
# ============================================================
networks:
  short-url-network:
    driver: bridge